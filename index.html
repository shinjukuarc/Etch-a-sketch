<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch-a-sketch</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="program">
        <div class="button-container">
            <button id="one" class="black">Black</button>
            <button id="two" class="intensify BW">Intensify</button>
            <button id="three" class="rgb">rgb (random)</button>
            <button id="four" class="intensify RGB">Intensify rgb</button>
            <button class="clear">clear</button>
        </div>
        <div class="container">
            <div>enter the number of squares. eg: 12x12</div>
            <div class="input-container">
                <div class="number-container">
                    <input type="number" class="row-amount">
                    <span>x</span>
                    <input type="number" class="col-amount">
                </div>
                <button class="create">create</button>
            </div>
        </div>
    </div>
    <script src="code.js"></script>
</body>
</html>
